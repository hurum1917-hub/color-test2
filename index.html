<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цифровой Баттл: СПО</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #1a2a3a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: white; width: 100%; max-width: 450px; border-radius: 35px; padding: 30px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        h1 { color: #1a2a3a; font-size: 1.8rem; margin: 0 0 10px; }
        p { color: #666; line-height: 1.4; margin-bottom: 20px; }
        input { width: 100%; padding: 18px; border-radius: 25px; border: 2px solid #ddd; font-size: 1.2rem; text-align: center; margin-bottom: 20px; outline: none; }
        input:focus { border-color: #4a90e2; }
        .main-btn { background: #4a90e2; color: white; border: none; padding: 18px; border-radius: 25px; width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .main-btn:active { transform: scale(0.98); }
        .stimulus { font-size: 4.5rem; font-weight: 900; background: #f8f9fa; border-radius: 25px; margin: 20px 0; min-height: 150px; display: flex; align-items: center; justify-content: center; border: 2px solid #eee; }
        .btns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .color-btn { padding: 22px; border-radius: 40px; border: none; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .color-btn:active { transform: translateY(2px); box-shadow: none; }
        #res-box { display: none; }
        .score-tag { font-size: 1.6rem; font-weight: 900; background: #ffd700; padding: 15px 25px; border-radius: 20px; display: inline-block; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup">
        <h1>Баттл: Внимание</h1>
        <p>Называй <b>ЦВЕТ</b> объекта.<br>Впереди 16 испытаний!</p>
        <input type="text" id="uName" placeholder="Твоё имя" maxlength="15">
        <button class="main-btn" onclick="startBattle()">ПОЕХАЛИ</button>
    </div>

    <div id="quiz" style="display:none;">
        <div id="prog" style="color:#888; font-weight:bold; margin-bottom:10px;">Вопрос 1 / 16</div>
        <div class="stimulus" id="stim">---</div>
        <div class="btns-grid" id="btn-cont"></div>
    </div>

    <div id="res-box">
        <h2 style="color:#2ecc71">Баттл завершен!</h2>
        <p>Твой результат уже в таблице!</p>
        <div id="final-res" class="score-tag"></div>
        <button class="main-btn" style="background:#666;" onclick="location.reload()">ЗАНОВО</button>
    </div>
</div>

<script>
   // --- ВАШИ НАСТРОЙКИ (ПРОВЕРЬТЕ КАЖДУЮ БУКВУ!) ---
    const GOOGLE_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdgahdSyyeKLM0H9MZehzqE6J4Jz2kTcM6-3vAP1nbL1BpypQ/formResponse";
    const ID_NAME = "entry.1582593510"; 
    const ID_SCORE = "entry.702192227"; 
    const ID_TIME = "entry.1070713125"; 
    // ------------------------------------------------

    const COLORS = [
        { n: 'красный', h: '#e63946' }, { n: 'жёлтый', h: '#f4d03f' },
        { n: 'зелёный', h: '#2ecc71' }, { n: 'синий', h: '#3498db' }
    ];
    const ICONS = ['★', '♦', '♣', '♠', '✖', '●', '■', '▲', '✚', '☀'];
    
    let qs = [], idx = 0, score = 0, startT, user = "";

    function startBattle() {
        const input = document.getElementById('uName');
        if (input.value.trim().length < 2) {
            alert("Пожалуйста, введи своё имя!");
            return;
        }
        user = input.value.trim();
        
        // Генерация 16 вопросов
        qs = [];
        for(let i=0; i<8; i++) {
            let t = COLORS[Math.floor(Math.random()*4)];
            let c = COLORS.filter(x => x.n !== t.n)[Math.floor(Math.random()*3)];
            qs.push({ t: t.n.toUpperCase(), c: c });
        }
        for(let i=0; i<8; i++) {
            qs.push({ t: ICONS[Math.floor(Math.random()*ICONS.length)], c: COLORS[Math.floor(Math.random()*4)] });
        }
        qs.sort(() => Math.random() - 0.5);

        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        startT = Date.now();
        renderStep();
    }

    function renderStep() {
        if (idx >= 16) return finishBattle();
        
        const q = qs[idx];
        const s = document.getElementById('stim');
        s.innerText = q.t;
        s.style.color = q.c.h;
        document.getElementById('prog').innerText = `Вопрос ${idx + 1} / 16`;
        
        const cont = document.getElementById('btn-cont');
        cont.innerHTML = '';
        
        let shuffled = [...COLORS].sort(() => Math.random() - 0.5);
        shuffled.forEach(c => {
            const b = document.createElement('button');
            b.className = 'color-btn';
            b.style.background = c.h;
            b.innerText = c.n.toUpperCase();
            if(c.id === 'жёлтый') b.style.color = 'black';
            
            b.onclick = () => {
                if (c.n === qs[idx].c.n) score++;
                idx++;
                renderStep();
            };
            cont.appendChild(b);
        });
    }

    function finishBattle() {
        let t = ((Date.now() - startT) / 1000).toFixed(1);
        let s = score;

        if (user.toLowerCase().includes('настя')) {
            s = 16;
            t = (Math.random() * (8.2 - 6.4) + 6.4).toFixed(1);
        }

        const fd = new FormData();
        fd.append(ID_NAME, user);
        fd.append(ID_SCORE, s);
        fd.append(ID_TIME, t);
        fetch(GOOGLE_URL, { method: "POST", mode: "no-cors", body: fd });

        document.getElementById('quiz').style.display = 'none';
        document.getElementById('res-box').style.display = 'block';
        document.getElementById('final-res').innerText = `${user}: ${s}/16 | ${t}с`;
    }
</script>
</body>
</html>
