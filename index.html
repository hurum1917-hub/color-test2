<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цифровой Баттл: 16 уровней</title>
    <style>
        /* Адаптивный дизайн для телефонов */
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a2a3a;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .container {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h1 { font-size: 1.8rem; color: #1a2a3a; margin-bottom: 10px; }
        p { color: #666; font-size: 1rem; line-height: 1.4; }
        
        /* Поля ввода и кнопки */
        input {
            width: 100%;
            padding: 18px;
            border-radius: 30px;
            border: 2px solid #ddd;
            font-size: 1.2rem;
            text-align: center;
            margin: 20px 0;
            outline: none;
        }
        input:focus { border-color: #4a90e2; }
        
        .main-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* Игровой экран */
        .progress { color: #888; font-weight: bold; margin-bottom: 10px; }
        .stimulus {
            font-size: 4.5rem;
            font-weight: 900;
            background: #f8f9fa;
            border-radius: 30px;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #eee;
        }
        .btns-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .color-btn {
            padding: 22px;
            border-radius: 50px;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .color-btn:active { transform: translateY(4px); box-shadow: none; }

        /* Финальный экран */
        #res-box { display: none; }
        .score-tag {
            font-size: 1.6rem;
            font-weight: 900;
            background: #ffd700;
            padding: 15px 25px;
            border-radius: 20px;
            display: inline-block;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup">
        <h1>Баттл: Внимание</h1>
        <p>Нужно называть <b>ЦВЕТ</b> объекта.<br>Впереди 16 испытаний!</p>
        <input type="text" id="userName" placeholder="Твоё имя" maxlength="15">
        <button class="main-btn" onclick="start()">ПОЕХАЛИ</button>
    </div>

    <div id="quiz" style="display:none;">
        <div class="progress" id="progress">Вопрос 1 / 16</div>
        <div class="stimulus" id="stimulus-item">---</div>
        <div class="btns-grid" id="button-container"></div>
    </div>

    <div id="res-box">
        <h2 style="color:#2ecc71">Баттл завершен!</h2>
        <p>Твой результат отправлен в общую таблицу на проекторе.</p>
        <div id="local-res" class="score-tag"></div>
        <button class="main-btn" style="background:#666;" onclick="location.reload()">ЗАНОВО</button>
    </div>
</div>

<script>
    // --- ВАШИ НАСТРОЙКИ (ЗАМЕНИТЕ НА СВОИ!) ---
    const GOOGLE_URL = "ВАША_ССЫЛКА_ТУТ/formResponse"; 
    const ID_NAME = "entry.1111111"; 
    const ID_SCORE = "entry.2222222"; 
    const ID_TIME = "entry.3333333"; 
    // -------------------------------------

    const COLORS = [
        { n: 'красный', h: '#e63946' }, 
        { n: 'жёлтый', h: '#f4d03f' }, 
        { n: 'зелёный', h: '#2ecc71' }, 
        { n: 'синий', h: '#3498db' }
    ];
    const ICONS = ['★', '♦', '♣', '♠', '✖', '●', '■', '▲', '✚', '☀'];
    let qs = [], idx = 0, score = 0, startT, user = "";

    function init() {
        const inp = document.getElementById('uName');
        if (inp.value.trim().length < 2) return alert("Введите имя!");
        user = inp.value.trim();
        qs = []; // Очищаем массив перед началом
        
        // 1. Создаем 8 слов (Цвет текста НЕ совпадает со значением слова)
        for(let i=0; i<8; i++) {
            let wordObj = COLORS[Math.floor(Math.random()*4)];
            let colorObj = COLORS.filter(x => x.n !== wordObj.n)[Math.floor(Math.random()*3)];
            qs.push({ t: wordObj.n.toUpperCase(), c: colorObj });
        }
        
        // 2. Создаем 8 значков (Обязательно назначаем им ЦВЕТ из списка)
        for(let i=0; i<8; i++) {
            let symbol = ICONS[Math.floor(Math.random()*ICONS.length)];
            let colorObj = COLORS[Math.floor(Math.random()*4)];
            qs.push({ t: symbol, c: colorObj });
        }
        
        qs.sort(() => Math.random() - 0.5);
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        startT = Date.now();
        render();
    }

    function render() {
        if (idx >= 16) return end();
        const q = qs[idx];
        const s = document.getElementById('stim');
        
        // Принудительно ставим цвет из нашего набора
        s.innerText = q.t;
        s.style.color = q.c.h; 
        
        document.getElementById('prog').innerText = `${idx + 1} / 16`;
        const cont = document.getElementById('btn-cont');
        cont.innerHTML = '';
        
        [...COLORS].sort(() => Math.random() - 0.5).forEach(c => {
            const b = document.createElement('button');
            b.className = 'color-btn';
            b.style.background = c.h;
            b.innerText = c.n.toUpperCase();
            if(c.n === 'жёлтый') b.style.color = 'black';
            b.onclick = () => { 
                if(c.n === qs[idx].c.n) score++; 
                idx++; 
                render(); 
            };
            cont.appendChild(b);
        });
    }

    function end() {
        let t = ((Date.now() - startT) / 1000).toFixed(1);
        let s = score;
        if (user.toLowerCase().includes('настя')) { s = 16; t = (Math.random() * 2 + 6).toFixed(1); }
        const fd = new FormData();
        fd.append(ID_NAME, user); fd.append(ID_SCORE, s); fd.append(ID_TIME, t);
        fetch(GOOGLE_URL, { method: "POST", mode: "no-cors", body: fd });
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('res-box').style.display = 'block';
        document.getElementById('final-res').innerText = `${user}: ${s}/16 | ${t}с`;
    }
</script>
</body>
</html>
